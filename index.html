<!DOCTYPE html>
<html>
<head><meta name="google-site-verification" content="d1XxRR4mts9LgUYJZPTrH9OFMRLdG7DT4Zub9fWM9Ng" />
<title>PetHelp AI</title>

<style>
body{
  margin:0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  text-align:center;
}

h1{
  margin-top:40px;
  font-size:42px;
  letter-spacing:1px;
}

#chat{
  width:60%;
  height:350px;
  margin:30px auto;
  background:rgba(255,255,255,0.06);
  backdrop-filter: blur(10px);
  border-radius:20px;
  padding:15px;
  overflow-y:auto;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  text-align:left;
}

.message{
  margin:10px 0;
  padding:10px 14px;
  border-radius:12px;
  max-width:75%;
}

.user{
  background:#3b82f6;
  margin-left:auto;
}

.ai{
  background:#22c55e;
  margin-right:auto;
}

.input-area{
  margin-bottom:40px;
}

input{
  width:40%;
  padding:12px;
  border-radius:25px;
  border:none;
  outline:none;
  font-size:15px;
}

button{
  padding:12px 18px;
  border-radius:25px;
  border:none;
  background:#22c55e;
  color:white;
  font-weight:bold;
  cursor:pointer;
  margin-left:8px;
}

button:hover{
  background:#16a34a;
}
</style>
</head>

<body>

<h1>🐾 PetHelp AI</h1>

<div id="chat">
  <div class="message ai"><b>Pet AI:</b> Hello! Ask me anything about your pet 🐶🐱</div>
</div>

<div class="input-area">
  <input id="msg" placeholder="Example: Why is my dog not eating?">
  <button onclick="send()">Send</button>
</div>

<script>
function send(){
  let input = document.getElementById("msg");
  let message = input.value.trim();
  if(message==="") return;

  let chat = document.getElementById("chat");

  chat.innerHTML += `<div class="message user"><b>You:</b> ${message}</div>`;
  chat.innerHTML += `<div class="message ai"><b>Pet AI:</b> I am still learning. For serious issues, please visit a vet.</div>`;

  chat.scrollTop = chat.scrollHeight;
  input.value="";
}
</script>

</body>
</html>
